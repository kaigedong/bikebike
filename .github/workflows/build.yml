name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Job 1: 编译构建 (Rust + Android APK)
  build-apk:
    name: 编译 APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: keep-core -> target
          cache-targets: true
          cache-on-failure: true

      - name: Cache cargo-ndk
        id: cache-cargo-ndk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-${{ runner.os }}-v1

      - name: Install cargo-ndk
        if: steps.cache-cargo-ndk.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Setup NDK path
        run: |
          NDK_VERSION=$(ls $ANDROID_HOME/ndk/ | head -1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Build Rust keep-core
        run: |
          cd keep-core
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 \
            -o ../app/src/main/jniLibs build --release

      - name: Run Rust tests
        run: cd keep-core && cargo test

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/bikebike-latest.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bikebike-debug-apk
          path: app/build/outputs/apk/debug/bikebike-latest.apk

  # Job 2: 发布到 GitHub Releases (仅 main push)
  publish-release:
    name: 发布到 Releases
    needs: build-apk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: bikebike-debug-apk
          path: ./apk

      - name: Generate release notes
        id: notes
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y-%m-%d\ %H:%M)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          {
            echo "notes<<EOF"
            echo "Auto build from main branch"
            echo ""
            echo "**Date**: ${DATE}"
            echo "**Commit**: ${SHORT_SHA} - ${COMMIT_MSG}"
            echo ""
            echo "---"
            echo "Download bikebike-latest.apk and install."
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: ${{ steps.notes.outputs.notes }}
          prerelease: false
          files: ./apk/bikebike-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: 检查 Rust crate 更新 (仅手动触发)
  check-dependencies:
    name: 检查依赖更新
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check for crate updates
        working-directory: keep-core
        run: |
          cargo install cargo-outdated
          cargo outdated --format markdown > ../crate_update_report.md || true
          cat ../crate_update_report.md

      - name: Create issue for updates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('crate_update_report.md', 'utf8');
            if (report.includes('|')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Rust crate updates available',
                body: report,
                labels: ['dependencies']
              });
            }
